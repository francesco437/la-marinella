<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santosa — Tours & Excursions</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --teal:#2BA89E;
  --teal-dark:#1F8A81;
  --teal-deep:#0D3D3A;
  --header:#0891B2;
}
body{font-family:'Source Sans 3',sans-serif;background:#0E7490;color:#fff;min-height:100vh;}
.page-wrap{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  background:
    linear-gradient(180deg,rgba(8,145,178,.16) 0%,rgba(14,116,144,.08) 38%,rgba(14,116,144,.18) 100%),
    url("tours-bg.png") center top/cover no-repeat;
}

/* ── HEADER ── */
.header{background:rgba(8,145,178,.32);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.18);}
.back-btn{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:600;}
.back-btn svg{width:18px;height:18px;}
.header-title{font-size:17px;font-weight:800;letter-spacing:-.2px;color:white;}
.room-badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;color:white;}

/* ── HERO ── */
.hero{padding:36px 20px 28px;text-align:center;text-shadow:0 4px 20px rgba(0,0,0,.12);}
.hero-label{font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.85);margin-bottom:10px;}
.hero-title{font-size:37px;font-weight:800;line-height:1.08;margin-bottom:12px;letter-spacing:-.5px;color:white;}
.hero-sub{font-size:18px;color:rgba(255,255,255,.88);max-width:350px;margin:0 auto;line-height:1.6;font-weight:400;}

/* ── LOADING / EMPTY ── */
.loading-wrap{padding:60px 20px;text-align:center;}
.loading-spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:rgba(255,255,255,.8);font-size:14px;}
.empty-state{padding:60px 20px;text-align:center;color:rgba(255,255,255,.8);}
.empty-state .ei{font-size:52px;margin-bottom:14px;opacity:.5;}

/* ── TOURS GRID 2 COL ── */
.tours-list{padding:0 16px 80px;display:flex;flex-direction:column;gap:16px;}
.tour-card{background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.12);position:relative;display:flex;flex-direction:column;}

.tour-hero{position:relative;width:100%;height:210px;overflow:hidden;background:#e0e0e0;flex-shrink:0;}
.tour-hero img{width:100%;height:100%;object-fit:cover;display:block;}

.tour-hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1F8A81,#0D3D3A);}
.hero-price-badge{position:absolute;bottom:12px;left:12px;background:rgba(20,20,20,.78);padding:7px 12px;border-radius:12px;font-size:15px;font-weight:800;color:white;width:104px;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:.02em;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.gallery-strip{display:none;}
.tour-body{background:#fff;padding:16px 18px 18px;position:relative;}
.tour-name{font-size:20px;font-weight:800;margin-bottom:7px;line-height:1.25;letter-spacing:-.2px;color:#111827;padding-right:56px;}
.tour-desc-short{font-size:15px;color:#6B7280;line-height:1.55;margin-bottom:12px;padding-right:56px;}
.pills{display:flex;flex-wrap:wrap;gap:6px;}
.pill{background:rgba(43,168,158,.1);border:1px solid rgba(43,168,158,.2);padding:5px 11px;border-radius:11px;font-size:13px;font-weight:600;color:#1F8A81;display:inline-flex;align-items:center;gap:5px;}
.pill.pickup{background:rgba(43,168,158,.1);border-color:rgba(43,168,158,.2);color:#1F8A81;}


.tour-card-footer{display:none;}
.tour-card-price{display:none;}
.tour-card-cta{display:none;}
.tour-plus-btn{position:absolute;bottom:16px;right:16px;width:42px;height:42px;border-radius:50%;background:#2BA89E;border:none;color:white;font-size:24px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.15);transition:transform .15s;line-height:1;}
.tour-plus-btn:active{transform:scale(.93);}

/* ── TOUR DETAIL SHEET ── */
.detail-sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.detail-sheet-overlay.open{display:flex;}
.detail-sheet{background:linear-gradient(180deg,#F7FBFC 0%,#EEF8F8 100%);border-radius:28px 28px 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;position:relative;border-top:1px solid rgba(255,255,255,.35);box-shadow:0 -16px 40px rgba(0,0,0,.16);}
.ds-handle{width:44px;height:4px;background:rgba(13,61,58,.18);border-radius:2px;margin:14px auto 0;}
.ds-hero{width:100%;height:220px;position:relative;overflow:hidden;}
.ds-hero img{width:100%;height:100%;object-fit:cover;}
.ds-hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(46,134,171,.4),rgba(26,74,94,.6));font-size:60px;opacity:.5;}
.ds-gallery{display:flex;gap:6px;padding:10px 14px;background:rgba(8,145,178,.08);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ds-gallery::-webkit-scrollbar{display:none;}
.ds-gallery-thumb{width:68px;height:50px;border-radius:9px;object-fit:cover;flex-shrink:0;cursor:pointer;border:2px solid transparent;opacity:.7;transition:all .2s;}
.ds-gallery-thumb.active{border-color:var(--teal);opacity:1;}
.ds-close{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;}
.ds-body{padding:20px 18px 40px;}
.ds-name{font-size:25px;font-weight:800;margin-bottom:8px;letter-spacing:-.3px;color:#111827;}
.ds-desc{font-size:16px;color:#5B6472;line-height:1.68;margin-bottom:18px;}
.ds-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.ds-pill{background:rgba(255,255,255,.82);border:1px solid rgba(8,145,178,.12);padding:6px 13px;border-radius:20px;font-size:14px;font-weight:600;color:#374151;display:inline-flex;align-items:center;gap:6px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.ds-pill.pickup{background:rgba(43,168,158,.1);border-color:rgba(43,168,158,.3);color:#1F8A81;}
.ds-includes-label{font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#6B7280;margin-bottom:10px;}
.ds-includes-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px;}
.ds-include-tag{background:rgba(43,168,158,.1);border:1px solid rgba(43,168,158,.2);padding:6px 13px;border-radius:20px;font-size:14px;color:#111827;display:flex;align-items:center;gap:6px;}
.ds-include-tag::before{content:'✓';color:#2BA89E;font-weight:800;font-size:13px;}
.ds-divider{height:1px;background:rgba(13,61,58,.08);margin:18px 0;}
.ds-booking-label{font-size:16px;font-weight:800;color:#5B6472;margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px;}

.form-label{font-size:13.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#7A8794;margin-bottom:8px;display:block;}
.form-group{margin-bottom:16px;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-input{width:100%;padding:14px 16px;background:rgba(255,255,255,.84);border:1.5px solid rgba(8,145,178,.12);border-radius:13px;font-family:'Source Sans 3',sans-serif;font-size:16px;color:#111827;outline:none;-webkit-appearance:none;transition:all .2s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.form-input::placeholder{color:#9CA3AF;}
.form-input:focus{border-color:#2BA89E;background:#fff;box-shadow:0 0 0 3px rgba(43,168,158,.1);}
.pax-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.pax-label{font-size:16px;font-weight:600;color:#374151;}
.pax-ctrl{display:flex;align-items:center;gap:14px;}
.pax-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.82);border:1.5px solid rgba(8,145,178,.12);color:#111827;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.pax-btn:hover{background:rgba(43,168,158,.15);border-color:#2BA89E;}
.pax-count{font-size:23px;font-weight:800;min-width:30px;text-align:center;color:#111827;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-top:1px solid #E5E7EB;margin-bottom:18px;}
.total-label{font-size:16px;color:#6B7280;}
.total-amount{font-size:27px;font-weight:800;color:#2BA89E;}
.book-btn{width:100%;padding:18px;background:#2BA89E;color:white;border:none;border-radius:14px;font-family:'Source Sans 3',sans-serif;font-size:18px;font-weight:800;cursor:pointer;transition:all .2s;letter-spacing:.2px;box-shadow:0 4px 16px rgba(43,168,158,.3);}
.book-btn:hover{background:#1F8A81;}
.book-btn:active{transform:scale(.98);}

/* ── MODAL SHEET ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal-sheet{background:linear-gradient(180deg,#FFFFFF 0%,#F7FBFC 100%);border-radius:28px 28px 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;padding:24px 20px 44px;position:relative;border-top:1px solid rgba(255,255,255,.25);box-shadow:0 -16px 40px rgba(0,0,0,.16);}
.modal-handle{width:44px;height:4px;background:rgba(0,0,0,.15);border-radius:2px;margin:0 auto 24px;}
.modal-title{font-size:21px;font-weight:800;margin-bottom:5px;letter-spacing:-.3px;color:#111827;}
.modal-sub{font-size:13px;color:#6B7280;margin-bottom:22px;line-height:1.5;}
.modal-close{position:absolute;top:20px;right:16px;background:rgba(255,255,255,.12);border:none;color:white;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.modal-close:hover{background:rgba(255,255,255,.22);}

/* ── PAYMENT ── */
.stripe-field{background:#F9FAFB;border:1.5px solid #E5E7EB;border-radius:13px;padding:15px;margin-bottom:12px;transition:border-color .2s;}
.stripe-field:focus-within{border-color:#2BA89E;}
.stripe-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.card-input{width:100%;background:transparent;border:none;outline:none;font-family:'Source Sans 3',sans-serif;font-size:15px;color:#111827;}
.card-input::placeholder{color:#9CA3AF;}
.secure-note{font-size:11px;color:#9CA3AF;text-align:center;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:5px;}
.pay-btn{width:100%;padding:17px;background:#2BA89E;color:white;border:none;border-radius:14px;font-family:'Source Sans 3',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(43,168,158,.3);}
.pay-btn:hover{opacity:.9;}
.pay-btn:disabled{opacity:.45;cursor:not-allowed;}

/* ── SUCCESS ── */
.success-screen{text-align:center;padding:10px 0;}
.success-icon{font-size:60px;margin-bottom:18px;}
.success-title{font-size:24px;font-weight:800;margin-bottom:10px;letter-spacing:-.3px;color:#111827;}
.success-msg{font-size:15px;color:#6B7280;line-height:1.65;margin-bottom:22px;}
.detail-box{background:linear-gradient(180deg,#F9FCFD 0%,#F2FAFA 100%);border:1px solid rgba(8,145,178,.12);border-radius:16px;padding:18px;text-align:left;font-size:14px;margin-bottom:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,.65);}
.detail-box .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(8,145,178,.08);}
.detail-box .row:last-child{border:none;}
.detail-box .row span:first-child{color:#6B7280;}
.detail-box .row span:last-child{font-weight:700;}
.done-btn{width:100%;padding:15px;background:#F3F4F6;border:1.5px solid #E5E7EB;color:#374151;border-radius:13px;font-family:'Source Sans 3',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;}
.done-btn:hover{background:rgba(255,255,255,.18);}

/* ── WA BAR ── */
.wa-bar{margin:0 16px 28px;background:rgba(8,145,178,.32);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.2);border-radius:18px;padding:17px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 10px 24px rgba(0,0,0,.08);}
.wa-icon{font-size:30px;}
.wa-text{flex:1;font-size:15px;color:white;line-height:1.55;font-weight:600;}
.wa-btn{background:#25D366;color:white;border:none;padding:11px 18px;border-radius:11px;font-family:'Source Sans 3',sans-serif;font-size:15px;font-weight:800;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.wa-btn:hover{opacity:.9;}

/* ── TOAST ── */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(10,22,40,.95);border:1px solid rgba(255,255,255,.1);color:white;padding:13px 26px;border-radius:14px;font-size:14px;font-weight:600;z-index:500;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── CATEGORY FILTERS ── */
.cat-filters{padding:0 16px 20px;}
.cat-select-wrap{position:relative;}
.cat-select-wrap svg{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;stroke:rgba(255,255,255,.8);fill:none;stroke-width:2.5;stroke-linecap:round;pointer-events:none;}
.cat-select{width:100%;padding:16px 44px 16px 18px;background:rgba(255,255,255,.18);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1.5px solid rgba(255,255,255,.38);border-radius:16px;font-family:'Source Sans 3',sans-serif;font-size:16px;font-weight:700;color:white;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;transition:all .2s;box-shadow:0 8px 20px rgba(0,0,0,.06);}
.cat-select:focus{border-color:rgba(255,255,255,.65);background:rgba(255,255,255,.22);}
.cat-select option{background:#0F2133;color:white;}

/* ── PAYMENT METHOD ── */
.pay-method-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
.pay-method-btn{padding:18px 10px;border-radius:16px;border:2px solid #E5E7EB;background:#F9FAFB;color:#374151;font-family:'Source Sans 3',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;}
.pay-method-btn:hover{background:#F3F4F6;border-color:#D1D5DB;}
.pay-method-btn.selected{background:rgba(43,168,158,.15);border-color:#2BA89E;color:#1F8A81;box-shadow:0 0 0 3px rgba(43,168,158,.1);}
.pay-method-icon{font-size:28px;display:block;margin-bottom:7px;}
.cash-note{background:linear-gradient(180deg,#F9FCFD 0%,#F3FAFA 100%);border:1px solid rgba(8,145,178,.12);border-radius:13px;padding:15px;font-size:13px;color:#5B6472;line-height:1.6;margin-bottom:18px;}
.card-section{display:none;}
.card-section.visible{display:block;}
.helper-note{font-size:12px;color:#9CA3AF;line-height:1.5;margin-top:6px;text-align:center;}
.mini-section{margin-bottom:16px;padding:14px;border:1px solid rgba(8,145,178,.12);border-radius:16px;background:rgba(255,255,255,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.mini-section-title{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#7A8794;margin-bottom:10px;}
.optional-wrap{margin-bottom:14px;border:1px solid rgba(8,145,178,.12);border-radius:14px;background:rgba(255,255,255,.82);overflow:hidden;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.optional-toggle{padding:12px 14px;cursor:pointer;font-size:13px;font-weight:700;color:#2BA89E;list-style:none;}
.optional-toggle::-webkit-details-marker{display:none;}
.optional-body{padding:0 14px 14px;}
.doc-upload{border:1.5px dashed rgba(8,145,178,.25);border-radius:16px;padding:14px;background:rgba(255,255,255,.76);}
.doc-upload-actions{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.doc-btn{padding:13px 16px;border-radius:12px;border:1.5px solid #0891B2;background:#fff;color:#0891B2;width:100%;text-align:left;display:flex;align-items:center;gap:10px;font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.doc-camera{display:none;margin-bottom:12px;}
.doc-camera.show{display:block;}
.doc-camera-shell{position:relative;width:100%;max-width:340px;margin:0 auto;border-radius:14px;overflow:hidden;background:#06101b;border:1px solid rgba(255,255,255,.12);}
.doc-video{display:block;width:100%;aspect-ratio:1.42/1;object-fit:cover;}
.doc-camera-guide{position:absolute;inset:16px;border:2px solid rgba(255,255,255,.95);border-radius:12px;box-shadow:0 0 0 999px rgba(5,10,20,.3) inset;pointer-events:none;}
.doc-camera-note{font-size:12px;color:#9CA3AF;text-align:center;margin-top:6px;line-height:1.4;}
.doc-camera-actions{display:flex;justify-content:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
.doc-preview-wrap{display:none;}
.doc-preview-wrap.show{display:block;}
.doc-preview-shell{position:relative;width:100%;max-width:340px;margin:0 auto;}
.doc-preview{width:100%;aspect-ratio:1.42/1;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.25);}
.doc-preview-guide{position:absolute;inset:10px;border:2px solid rgba(255,255,255,.85);border-radius:10px;box-shadow:0 0 0 999px rgba(10,22,40,.18) inset;pointer-events:none;}
.doc-status{font-size:12px;font-weight:700;color:#1F8A81;margin-top:8px;}
</style>
</head>
<body>

<div class="page-wrap"><div class="header" style="position:relative;">
  <div></div>
  <div class="header-title" style="position:absolute;left:50%;transform:translateX(-50%);">Tours & Excursions</div>
  <div class="room-badge" id="roomBadge">Room —</div>
</div>

<div class="hero">
  <div class="hero-label">Explore Phuket</div>
  <div class="hero-title">Discover Paradise</div>
  <div class="hero-sub">Hand-picked day trips and excursions from Santosa</div>
</div>

<div id="catFilters" style="display:none;" class="cat-filters">
  <div class="cat-select-wrap" style="position:relative;">
    <select class="cat-select" id="catSelect" onchange="filterByCategory(this.value)">
    </select>
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
</div>

<div id="mainContent">
  <div class="loading-wrap">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading tours…</div>
  </div>
</div>

<div class="wa-bar">
  <div class="wa-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
  <div class="wa-text">Questions about our tours? Our concierge is happy to help.</div>
  <button class="wa-btn" onclick="openWA()">WhatsApp</button>
</div>

<div class="detail-sheet-overlay" id="detailSheet">
  <div class="detail-sheet" id="detailSheetInner">
    <div class="ds-handle"></div>
    <div id="detailSheetContent"></div>
  </div>
</div>

<div class="modal-overlay" id="payModal">
  <div class="modal-sheet">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

</div><div class="toast" id="toast"></div>

<script>
const SB='https://zycptgrxnvbqsbngfuqi.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5Y3B0Z3J4bnZicXNibmdmdXFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTQxNjcsImV4cCI6MjA4ODQ5MDE2N30.PneFp7cqNFkyODdOY8o3JW7C8OgjzhQIQVR0Uyxyp8k';

function sanitizeRoom(v){
  return (v||'').toString().trim().replace(/[^a-zA-Z0-9]/g,'').slice(0,8);
}

function sanitizeSource(v){
  return (v||'').toString().trim().toLowerCase().replace(/[^a-z0-9_-]/g,'').slice(0,32);
}

function normalizeCategoryName(v, fallbackText=''){
  const raw=(v||'').toString().trim();
  const haystack=`${raw} ${fallbackText||''}`.toLowerCase();
  const key=raw.toLowerCase();
  if(key==='north thailand' || key==='north-thailand') return 'North Thailand';
  if(key==='south thailand' || key==='south-thailand') return 'South Thailand';
  if(key==='phuket & surroundings' || key==='phuket and surroundings' || key==='phuket-surroundings') return 'Phuket & Surroundings';
  if(/chiang mai|chiang rai|pai|golden triangle|elephant sanctuary|north/.test(haystack)) return 'North Thailand';
  if(/phi phi|james bond|krabi|similan|surin|koh lanta|khao sok|island|beach|snorkel|diving|sunset|cruise|day trip|south/.test(haystack)) return 'South Thailand';
  if(/phuket|old town|kata|karon|patong|freedom beach|surroundings|city|shopping|cultural/.test(haystack)) return 'Phuket & Surroundings';
  return 'Phuket & Surroundings';
}

function getRoomFromContext(){
  const params=new URLSearchParams(location.search);
  let room=params.get('room')||params.get('room_number')||params.get('roomNumber')||'';
  if(!room&&location.hash){
    const hashParams=new URLSearchParams(location.hash.replace(/^#/,''));
    room=hashParams.get('room')||hashParams.get('room_number')||hashParams.get('roomNumber')||'';
  }
  room=sanitizeRoom(room);
  if(room){
    try{localStorage.setItem('sg_room',room);}catch(e){}
    return room;
  }
  try{return sanitizeRoom(localStorage.getItem('sg_room'));}catch(e){return '';}
}

function getExternalSourceFromContext(){
  const params=new URLSearchParams(location.search);
  let src=params.get('src')||params.get('source')||params.get('qr')||'';
  if(!src&&location.hash){
    const hashParams=new URLSearchParams(location.hash.replace(/^#/,''));
    src=hashParams.get('src')||hashParams.get('source')||hashParams.get('qr')||'';
  }
  return sanitizeSource(src);
}

async function sb(path,opts={}){
  const {headers:extraHeaders={}, ...restOpts} = opts;
  const r=await fetch(`${SB}/rest/v1/${path}`,{
    ...restOpts,
    headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'application/json','Prefer':'return=representation',...extraHeaders},
  });
  if(!r.ok) throw new Error(await r.text());
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

function esc(v){
  return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function makeBookingCode(prefix='STR'){
  const d=new Date();
  const stamp=[
    d.getFullYear(),
    String(d.getMonth()+1).padStart(2,'0'),
    String(d.getDate()).padStart(2,'0')
  ].join('');
  const rand=Math.random().toString(36).slice(2,6).toUpperCase();
  return `${prefix}-${stamp}-${rand}`;
}

function analyzePassportCanvas(canvas){
  const ctx=canvas.getContext('2d',{willReadFrequently:true});
  const {data,width,height}=ctx.getImageData(0,0,canvas.width,canvas.height);
  let totalLuma=0;
  let edgeEnergy=0;
  let samples=0;
  for(let y=1;y<height-1;y+=2){
    for(let x=1;x<width-1;x+=2){
      const i=(y*width+x)*4;
      const l=0.2126*data[i]+0.7152*data[i+1]+0.0722*data[i+2];
      const left=((y*width+(x-1))*4);
      const right=((y*width+(x+1))*4);
      const up=(((y-1)*width+x)*4);
      const down=(((y+1)*width+x)*4);
      const lx=0.2126*data[left]+0.7152*data[left+1]+0.0722*data[left+2];
      const rx=0.2126*data[right]+0.7152*data[right+1]+0.0722*data[right+2];
      const uy=0.2126*data[up]+0.7152*data[up+1]+0.0722*data[up+2];
      const dy=0.2126*data[down]+0.7152*data[down+1]+0.0722*data[down+2];
      totalLuma+=l;
      edgeEnergy+=Math.abs(rx-lx)+Math.abs(dy-uy);
      samples++;
    }
  }
  const avgLuma=totalLuma/Math.max(samples,1);
  const sharpness=edgeEnergy/Math.max(samples,1);
  return {avgLuma,sharpness};
}

function buildNotesPayload(userNotes,meta){

}

async function centerCropPassport(file){
  const img=await new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>{
      const image=new Image();
      image.onload=()=>resolve(image);
      image.onerror=reject;
      image.src=fr.result;
    };
    fr.onerror=reject;
    fr.readAsDataURL(file);
  });
  const targetRatio=1.42;
  let sx=0,sy=0,sw=img.width,sh=img.height;
  const srcRatio=img.width/img.height;
  if(srcRatio>targetRatio){
    sw=Math.round(img.height*targetRatio);
    sx=Math.round((img.width-sw)/2);
  }else{
    sh=Math.round(img.width/targetRatio);
    sy=Math.round((img.height-sh)/2);
  }
  const canvas=document.createElement('canvas');
  canvas.width=1200;
  canvas.height=Math.round(1200/targetRatio);
  const ctx=canvas.getContext('2d');
  ctx.drawImage(img,sx,sy,sw,sh,0,0,canvas.width,canvas.height);
  const analysis=analyzePassportCanvas(canvas);
  const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',0.9));
  return {blob,previewUrl:canvas.toDataURL('image/jpeg',0.9),analysis};
}

function resetPassportUploadUI(){
  passportUploadState={blob:null,previewUrl:'',uploadedPath:null,uploadedUrl:null};
  const previewWrap=document.getElementById('passportPreviewWrap');
  const preview=document.getElementById('passportPreview');
  const status=document.getElementById('passportStatus');
  const input=document.getElementById('passportPhoto');
  const camera=document.getElementById('passportCameraWrap');
  if(previewWrap)previewWrap.classList.remove('show');
  if(preview)preview.src='';
  if(status)status.textContent='';
  if(input)input.value='';
  if(camera)camera.classList.remove('show');
  stopPassportCamera();
}

function triggerPassportInput(){
  document.getElementById('passportPhoto')?.click();
}

function stopPassportCamera(){
  if(passportCameraStream){
    passportCameraStream.getTracks().forEach(t=>t.stop());
    passportCameraStream=null;
  }
  const video=document.getElementById('passportCameraVideo');
  if(video) video.srcObject=null;
}

async function openPassportCamera(){
  if(!navigator.mediaDevices?.getUserMedia){
    showToast('Camera not supported on this device');
    return;
  }
  try{
    stopPassportCamera();
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:960}},
      audio:false
    });
    passportCameraStream=stream;
    const wrap=document.getElementById('passportCameraWrap');
    const video=document.getElementById('passportCameraVideo');
    video.srcObject=stream;
    await video.play();
    wrap.classList.add('show');
    document.getElementById('passportStatus').textContent='Align the passport inside the frame, then take the photo.';
  }catch(e){
    console.error(e);
    showToast('Unable to access camera');
  }
}

async function capturePassportCamera(){
  const video=document.getElementById('passportCameraVideo');
  if(!video||!video.videoWidth){showToast('Camera not ready');return;}
  const canvas=document.createElement('canvas');
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',0.92));
  const file=new File([blob],'passport-camera.jpg',{type:'image/jpeg'});
  stopPassportCamera();
  document.getElementById('passportCameraWrap')?.classList.remove('show');
  await handlePassportBlob(file);
}

async function handlePassportBlob(file){
  try{
    const cropped=await centerCropPassport(file);
    if(cropped.analysis.avgLuma<55){
      showToast('Passport photo is too dark. Please retake with better light.');
      return;
    }
    if(cropped.analysis.avgLuma>235){
      showToast('Passport photo is too bright. Please reduce glare and retake.');
      return;
    }
    if(cropped.analysis.sharpness<18){
      showToast('Passport photo looks blurry. Please hold steady and retake.');
      return;
    }
    passportUploadState={blob:cropped.blob,previewUrl:cropped.previewUrl,uploadedPath:null,uploadedUrl:null};
    document.getElementById('passportPreview').src=cropped.previewUrl;
    document.getElementById('passportPreviewWrap').classList.add('show');
    document.getElementById('passportStatus').textContent='Passport prepared. Check that all corners are visible, otherwise retake.';
  }catch(e){
    console.error(e);
    showToast('Could not process passport photo');
  }
}

function retakePassportPhoto(){
  passportUploadState={blob:null,previewUrl:'',uploadedPath:null,uploadedUrl:null};
  document.getElementById('passportPreviewWrap')?.classList.remove('show');
  document.getElementById('passportPreview').src='';
  openPassportCamera();
}

async function handlePassportFile(input){
  const file=input.files&&input.files[0];
  if(!file)return;
  await handlePassportBlob(file);
}

async function uploadPassportPhoto(bookingCode){
  if(passportUploadState.uploadedPath)return passportUploadState;
  if(!passportUploadState.blob) throw new Error('Passport photo missing');
  const path=`${bookingCode}/passport.jpg`;
  const r=await fetch(`${SB}/storage/v1/object/${PASSPORT_BUCKET}/${path}`,{
    method:'POST',
    headers:{'apikey':SK,'Authorization':`Bearer ${SK}`,'Content-Type':'image/jpeg','x-upsert':'true'},
    body:passportUploadState.blob
  });
  if(!r.ok) throw new Error(await r.text());
  passportUploadState.uploadedPath=path;
  passportUploadState.uploadedUrl=`${SB}/storage/v1/object/authenticated/${PASSPORT_BUCKET}/${path}`;
  return passportUploadState;
}

async function loadTours(){
  try{
    const toursData=await sb('tours?active=eq.true&order=sort_order,created_at');
    if(!toursData||!toursData.length){renderEmpty();return;}
    const ids=toursData.map(t=>t.id).join(',');
    let images=[];
    try{images=await sb(`tour_images?tour_id=in.(${ids})&order=sort_order`)||[];}catch(e){}
    tours=toursData.map(t=>({...t,category:normalizeCategoryName(t.category,`${t.name||''} ${t.description||''}`),images:images.filter(i=>i.tour_id===t.id),includes:parseIncludes(t.includes)}));

    renderCategoryFilters();
    renderTours();
  }catch(e){
    console.error(e);
    document.getElementById('mainContent').innerHTML=`<div class="empty-state"><div class="ei">⚠️</div><div style="font-size:16px;font-weight:700;margin-bottom:6px">Unable to load tours</div><div style="font-size:14px">Please contact the front desk</div></div>`;
  }
}

let availState={}; // tourId -> available spots for selected date

async function checkAvailability(tourId){
  const t=tours.find(x=>x.id===tourId);
  if(!t) return;
  if(!t.max_pax){
    // No max_pax set — always available, re-enable button
    const bookBtn=document.getElementById('book-'+tourId);
    if(bookBtn){bookBtn.disabled=false;bookBtn.style.opacity='1';bookBtn.textContent='Book Now';}
    return;
  }
  const date=document.getElementById('date-'+tourId).value;
  if(!date) return;
  try{
    const res=await fetch(`${SB}/rest/v1/tour_bookings?tour_id=eq.${tourId}&date=eq.${date}&status=neq.cancelled&select=pax`,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}});
    const rows=await res.json();
    const booked=(rows||[]).reduce((s,r)=>s+(r.pax||0),0);
    const avail=Math.max(0,t.max_pax-booked);
    availState[tourId]=avail;
    // Update pax if current selection exceeds available
    if(paxState[tourId]>avail && avail>0) paxState[tourId]=avail;
    if(avail===0) paxState[tourId]=0;
    updateAvailUI(tourId,t,avail);
  }catch(e){
    console.error(e);
    // Re-enable button even if availability check fails
    const bookBtn=document.getElementById('book-'+tourId);
    if(bookBtn){bookBtn.disabled=false;bookBtn.style.opacity='1';bookBtn.textContent='Book Now';}
  }
}

function updateAvailUI(tourId,t,avail){
  const paxEl=document.getElementById('pax-'+tourId);
  const totalEl=document.getElementById('total-'+tourId);
  const bookBtn=document.getElementById('book-'+tourId);
  const availEl=document.getElementById('avail-'+tourId);
  if(availEl){
    if(avail===0){
      availEl.innerHTML=`<span style="color:#ff6b6b;font-weight:700;font-size:13px">⚠️ Fully booked on this date</span>`;
    } else if(avail<=3){
      availEl.innerHTML=`<span style="color:#ffd166;font-weight:700;font-size:13px">⚡ Only ${avail} spot${avail>1?'s':''} left!</span>`;
    } else {
      availEl.innerHTML=`<span style="color:rgba(255,255,255,0.5);font-size:12px">${avail} of ${t.max_pax} spots available</span>`;
    }
  }
  if(paxEl) paxEl.textContent=avail===0?0:paxState[tourId];
  if(totalEl) totalEl.textContent=avail===0?'Unavailable':((t.price_per_person||0)*(paxState[tourId]||1)).toLocaleString()+' THB';
  if(bookBtn){
    if(avail===0){bookBtn.disabled=true;bookBtn.style.opacity='0.4';bookBtn.textContent='Fully Booked';}
    else{bookBtn.disabled=false;bookBtn.style.opacity='1';bookBtn.textContent='Book Now';}
  }
}

function changePax(tourId,delta,maxPax){
  const t=tours.find(x=>x.id===tourId);
  const avail=availState[tourId]!==undefined?availState[tourId]:maxPax;
  const effectiveMax=Math.min(maxPax,avail);
  const cur=paxState[tourId]||1;
  const next=Math.max(1,Math.min(effectiveMax,cur+delta));
  paxState[tourId]=next;
  document.getElementById('pax-'+tourId).textContent=next;
  if(t)document.getElementById('total-'+tourId).textContent=((t.price_per_person||0)*next).toLocaleString()+' THB';
}

async function startBooking(tourId){
  const t=tours.find(x=>x.id===tourId);
  const date=document.getElementById('date-'+tourId).value;
  const pax=paxState[tourId]||1;
  const notes=document.getElementById('notes-'+tourId)?.value?.trim()||'';
  const pickupLocation=document.getElementById('pickup-'+tourId)?.value?.trim()||'';
  const fullName=document.getElementById('guestFullName')?.value?.trim();
  const birthDate=document.getElementById('guestBirthDate')?.value||'';
  const passportNumber=document.getElementById('guestPassport')?.value?.trim();
  const whatsapp=document.getElementById('guestWhatsapp')?.value?.trim();
  const email=document.getElementById('guestEmail')?.value?.trim();
  const address=document.getElementById('guestAddress')?.value?.trim();
  const hotel=document.getElementById('guestHotel')?.value?.trim();
  const parts=(fullName||'').split(/\s+/).filter(Boolean);
  const firstName=parts.shift()||'';
  const lastName=parts.join(' ')||'';
  const guestName=[firstName,lastName].filter(Boolean).join(' ');
  if(!date){showToast('Please select a date');return;}
  if(!roomNum && accessMode!=='external_qr'){showToast('Access code not found');return;}
  if(!fullName || !guestName){showToast('Please enter full name');return;}
  if(!birthDate){showToast('Please enter date of birth');return;}
  if(!passportNumber){showToast('Please enter passport number');return;}
  if(!whatsapp){showToast('Please enter WhatsApp number');return;}
  if(!email){showToast('Please enter email');return;}
  if(!passportUploadState.blob && !passportUploadState.uploadedPath){showToast('Please add passport photo');return;}
  if(t.pickup&&!pickupLocation){showToast('Please enter your pickup location');return;}

  // Check availability
  try{
    const existing=await sb(`tour_bookings?tour_id=eq.${tourId}&date=eq.${date}&status=neq.cancelled&select=pax`);
    const bookedPax=(existing||[]).reduce((s,b)=>s+(b.pax||0),0);
    const maxPax=t.max_pax||999;
    const available=maxPax-bookedPax;
    if(available<=0){
      showToast('😔 Fully booked for this date');return;
    }
    if(pax>available){
      showToast(`Only ${available} spot${available>1?'s':''} left — adjusting guests`);
      paxState[tourId]=available;
      document.getElementById('pax-'+tourId).textContent=available;
      document.getElementById('total-'+tourId).textContent=((t.price_per_person||0)*available).toLocaleString()+' THB';
    }
    const finalPax=Math.min(pax,available);
    currentBooking={
      tour:t,
      date,
      pax:finalPax,
      total:(t.price_per_person||0)*finalPax,
      availableSpots:available,
      notes,
      pickupLocation,
      customer:{fullName:guestName,firstName,lastName,birthDate,passportNumber,whatsapp,email,address,hotel}
    };
    showPaymentModal();
  }catch(e){
    currentBooking={
      tour:t,
      date,
      pax,
      total:(t.price_per_person||0)*pax,
      notes,
      pickupLocation,
      customer:{fullName:guestName,firstName,lastName,birthDate,passportNumber,whatsapp,email,address,hotel}
    };
    showPaymentModal();
  }
}

function formatCard(el){

function formatExp(el){
  let v=el.value.replace(/\D/g,'');
  if(v.length>=3)v=v.substring(0,2)+' / '+v.substring(2,4);
  el.value=v;
}

async function processPayment(method){
  const guest=currentBooking.customer||{};
  const name=guest.fullName||[guest.firstName,guest.lastName].filter(Boolean).join(' ');
  const birthDate=guest.birthDate||'';
  const passportNumber=guest.passportNumber||'';
  const whatsapp=guest.whatsapp||'';
  const email=guest.email||'';
  const address=guest.address||'';
  const hotel=guest.hotel||'';
  if(!name){showToast('Guest details missing. Please go back.');return;}
  if(!passportUploadState.blob && !passportUploadState.uploadedPath){showToast('Passport photo missing. Please go back.');return;}
  const guestNotes=currentBooking.notes||null;
  const pickup=currentBooking.pickupLocation||null;
  const bookingCode=makeBookingCode();
  let passportState;
  try{
    passportState=await uploadPassportPhoto(bookingCode);
  }catch(e){
    console.error(e);
    showToast('Passport upload failed. Create storage bucket tour-passports first.');
    return;
  }
  const source=accessMode==='external_qr'?'external_qr':'room_qr';
  const baseMeta={
    booking_code:bookingCode,
    booking_source:source,
    commission_rate:bookingCommissionRate,
    source_code:externalSource||roomNum||null,
    customer:{
      first_name:guest.firstName||'',
      last_name:guest.lastName||'',
      birth_date:birthDate,
      passport_number:passportNumber,
      whatsapp,
      email,
      address,
      hotel:hotel||null
    },
    pickup_location:pickup||null,
    passport_photo_path:passportState.uploadedPath,
    passport_photo_url:passportState.uploadedUrl,
    special_requests:guestNotes||currentBooking.notes||null
  };
  const combinedNotes=buildNotesPayload([pickup?'Pickup: '+pickup:null,guestNotes||currentBooking.notes||null].filter(Boolean).join(' | '),baseMeta);

  if(method==='stripe'){
    const card=document.getElementById('cardNum')?.value?.replace(/\s/g,'');
    if(!card||card.length<16){showToast('Please enter card number');return;}
    const btn=document.getElementById('payBtn');
    btn.disabled=true;btn.textContent='Processing…';
    await new Promise(r=>setTimeout(r,1800));
    try{
      const stripeTotal=Math.round(currentBooking.total*1.03);
      const res2=await sb('tour_bookings',{
        method:'POST',
        headers:{'Prefer':'return=representation'},
        body:JSON.stringify({
          tour_id:currentBooking.tour.id,
          room_number:roomNum||null,
          guest_name:name,
          guest_phone:whatsapp,
          guest_email:email,
          date:currentBooking.date,
          pax:currentBooking.pax,
          total:stripeTotal,
          status:'confirmed',
          payment_method:'stripe',
          agent_name:currentBooking.tour.agent_name||null,
          notes:combinedNotes
        })
      });
      currentBooking.bookingId=(res2&&res2[0])?res2[0].id:null;
      currentBooking.totalPaid=stripeTotal;
      const originLabel=roomNum?`Room ${roomNum}`:'External QR';

      const waLink=`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;

    }catch(e){
      console.error(e);
      btn.disabled=false;
      btn.textContent=`Pay ${Math.round(currentBooking.total*1.03).toLocaleString()} THB`;
      showToast('Payment error — please try again');
    }
  } else if(method==='cash') {
    // CASH
    const btn=document.getElementById('cashBtn');
    btn.disabled=true;btn.textContent='Confirming…';
    await new Promise(r=>setTimeout(r,800));
    try{
      const res3=await sb('tour_bookings',{
        method:'POST',
        headers:{'Prefer':'return=representation'},

function formatDate(d){
  return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
}

function openWA(){
  const msg=roomNum?`Hello, I'm in Room ${roomNum} and have a question about your tours.`:accessMode==='external_qr'?`Hello, I opened the tours page from an external QR code and I have a question.`:'Hello, I have a question about your tours.';
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,'_blank');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('payModal').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});

loadTours();
</script>
